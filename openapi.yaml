openapi: 3.0.3
info:
  title: Agent Brain MCP Server
  description: |
    Autonomous Agent Brain HTTP API. Provides MCP JSON-RPC protocol over HTTP
    with SSE support for streaming responses.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      description: Check if the server is running and healthy
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        '503':
          description: Server is unhealthy

  /mcp:
    post:
      summary: MCP JSON-RPC endpoint
      description: Submit JSON-RPC requests for MCP tool execution
      operationId: mcpRpc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jsonrpc:
                  type: string
                  default: "2.0"
                id:
                  oneOf:
                    - type: string
                    - type: number
                    - type: null
                method:
                  type: string
                  enum:
                    - initialize
                    - tools/list
                    - tools/call
                    - resources/list
                    - resources/read
                    - prompts/list
                    - prompts/get
                params:
                  type: object
              required:
                - jsonrpc
                - method
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request

    get:
      summary: MCP SSE stream
      description: Server-Sent Events stream for server-initiated messages
      operationId: mcpSse
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object

    delete:
      summary: Terminate MCP session
      description: Close the current MCP session
      operationId: mcpClose
      responses:
        '200':
          description: Session closed

  /chat:
    post:
      summary: Interactive chat
      description: |
        Agentic chat endpoint with SSE event stream.
        Send a message and receive streaming responses.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: The chat message
                session_id:
                  type: string
                  description: Optional session ID for persistent conversations
                context:
                  type: object
                  description: Optional context to include
              required:
                - message
      responses:
        '200':
          description: Chat response stream
          content:
            text/event-stream:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key for authentication

security:
  - bearerAuth: []