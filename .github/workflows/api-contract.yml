# API Contract Validation Workflow
#
# This workflow validates OpenAPI specs against the actual API behavior,
# detects documentation drift, and exports healed specifications.
#
# Usage:
#   - Runs on push/PR to main branches
#   - Can be triggered manually with a spec URL
#   - Fails on breaking undocumented changes
#
# Requirements:
#   - Neo4j service for knowledge graph
#   - OpenAPI spec file in repository OR spec_url input

name: API Contract Validation

on:
  push:
    branches: [dev, test, prod]
    paths:
      - 'openapi.yaml'
      - 'openapi.json'
      - 'api-spec/**'
  pull_request:
    branches: [test, prod]
    paths:
      - 'openapi.yaml'
      - 'openapi.json'
      - 'api-spec/**'
  workflow_dispatch:
    inputs:
      spec_url:
        description: 'OpenAPI spec URL to validate'
        required: false
        type: string
      fail_on_breaking:
        description: 'Fail workflow on breaking changes'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-spec:
    name: Validate API Spec
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build agent-api
        run: cargo build --release

      - name: Initialize database schema
        run: cargo run --release -- init-db

      - name: Determine spec source
        id: spec
        run: |
          if [ -n "${{ inputs.spec_url }}" ]; then
            echo "source=${{ inputs.spec_url }}" >> $GITHUB_OUTPUT
            echo "Using provided URL: ${{ inputs.spec_url }}"
          elif [ -f "openapi.yaml" ]; then
            echo "source=openapi.yaml" >> $GITHUB_OUTPUT
            echo "Using openapi.yaml from repository"
          elif [ -f "openapi.json" ]; then
            echo "source=openapi.json" >> $GITHUB_OUTPUT
            echo "Using openapi.json from repository"
          else
            echo "::error::No OpenAPI spec found. Provide spec_url input or add openapi.yaml/json to repository."
            exit 1
          fi

      - name: Ingest OpenAPI spec
        run: cargo run --release -- ingest ${{ steps.spec.outputs.source }}

      - name: Show ingestion stats
        run: cargo run --release -- stats

      - name: Generate drift report
        run: |
          cargo run --release -- diff -f markdown > drift-report.md
          echo "## API Drift Report" >> $GITHUB_STEP_SUMMARY
          cat drift-report.md >> $GITHUB_STEP_SUMMARY

      - name: Check for breaking changes
        if: inputs.fail_on_breaking != false
        run: |
          cargo run --release -- diff --breaking-only -f json > breaking-changes.json

          # Check if file has content (breaking changes exist)
          if [ -s breaking-changes.json ] && [ "$(cat breaking-changes.json)" != "[]" ]; then
            echo "::error::Breaking API changes detected!"
            echo ""
            echo "## Breaking Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat breaking-changes.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            # Pretty print for logs
            echo "Breaking changes:"
            cat breaking-changes.json
            exit 1
          else
            echo "No breaking changes detected."
            echo "## No Breaking Changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Export healed spec (YAML)
        run: cargo run --release -- export -o healed-openapi.yaml

      - name: Export healed spec (JSON)
        run: cargo run --release -- export -f json -o healed-openapi.json

      - name: Upload healed specs
        uses: actions/upload-artifact@v4
        with:
          name: healed-openapi-specs
          path: |
            healed-openapi.yaml
            healed-openapi.json
          retention-days: 30

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            drift-report.md
            breaking-changes.json
          retention-days: 30

  # Optional: Update documentation with healed spec
  update-docs:
    name: Update Documentation
    needs: validate-spec
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download healed spec
        uses: actions/download-artifact@v4
        with:
          name: healed-openapi-specs

      - name: Check for spec changes
        id: diff
        run: |
          if [ -f "openapi.yaml" ]; then
            if ! diff -q openapi.yaml healed-openapi.yaml > /dev/null 2>&1; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with healed spec
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update OpenAPI spec with healed changes'
          title: 'docs: API spec healing updates'
          body: |
            This PR contains automatically healed OpenAPI specification changes.

            The API Knowledge Graph detected and corrected documentation drift.

            Please review the changes and merge if accurate.
          branch: docs/healed-api-spec
          delete-branch: true
