name: CI

on:
  push:
    branches: [master, main, dev, test, prod]
  pull_request:
    branches: [master, main, test, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Detect which paths changed — gates downstream jobs
  # -------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'hbi-frontend/**'

  # -------------------------------------------------------------------------
  # Format check — all branches
  # -------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  # -------------------------------------------------------------------------
  # Unit tests — all branches
  # -------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  # -------------------------------------------------------------------------
  # Frontend build & lint — all branches
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: hbi-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hbi-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # -------------------------------------------------------------------------
  # Clippy — test, prod, master, main
  # -------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.rust == 'true' && (
        github.ref == 'refs/heads/test' ||
        github.ref == 'refs/heads/prod' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main' ||
        github.base_ref == 'test' ||
        github.base_ref == 'prod' ||
        github.base_ref == 'master' ||
        github.base_ref == 'main'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features

  # -------------------------------------------------------------------------
  # Integration tests — test, prod only (needs Neo4j)
  # -------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.rust == 'true' && (
        github.ref == 'refs/heads/test' ||
        github.ref == 'refs/heads/prod' ||
        github.base_ref == 'test' ||
        github.base_ref == 'prod'
      )
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for Neo4j
        run: |
          for i in {1..30}; do
            if wget -q --spider http://localhost:7474; then
              echo "Neo4j is ready"
              break
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 2
          done
      - name: Run integration tests
        run: cargo test --test '*'
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

  # -------------------------------------------------------------------------
  # Release build — all branches, gated on fmt + unit tests
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, test-unit, frontend]
    if: >
      always() &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.test-unit.result == 'success' || needs.test-unit.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (
        github.ref == 'refs/heads/test' ||
        github.ref == 'refs/heads/prod' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main' ||
        github.base_ref == 'test' ||
        github.base_ref == 'prod' ||
        github.base_ref == 'master' ||
        github.base_ref == 'main'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  # -------------------------------------------------------------------------
  # Docker build + push to GHCR — prod only
  # -------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, clippy, test-integration]
    if: github.ref == 'refs/heads/prod'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
