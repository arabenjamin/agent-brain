services:
  # MCP Server with HTTP transport
  agent-brain:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"    # MCP HTTP endpoint (Use 3001 to avoid conflict if agent-api runs on 3000)
    environment:
      - NEO4J_URI=bolt://agent-api-neo4j-1:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - LLM_PROVIDER=ollama
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=granite4:latest
      - OLLAMA_EMBED_MODEL=bge-m3:latest
      - MCP_TRANSPORT=http
      - MCP_HTTP_BIND=0.0.0.0:3000
      # - MCP_API_KEY=${MCP_API_KEY:-}
      - SERPAPI_KEY=${SERPAPI_KEY:-}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/ara/gadgetlabs:/home/agent/gadgetlabs:ro
      - /home/ara/agent-brain:/home/agent/agent-brain:ro
    networks:
      - agent-api_default
      - ai-network
    restart: unless-stopped

networks:
  agent-api_default:
    external: true
  ai-network:
    external: true

volumes:
  neo4j_data:
  neo4j_logs:
