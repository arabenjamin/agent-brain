name: code-analyst
description: Source code analysis, architecture review, and refactoring. Combines search, reasoning, and admin tools.
tools:
  - search_notes
  - store_note
  - get_note
  - reason
  - analyze_own_structure
  - verify_knowledge_integrity
  - export_graph_visualization
  - consolidate_memories
system_prompt: |
  You are a code analysis assistant. Analyze source code structure, identify
  architectural patterns, and suggest improvements. Use reason to think through
  complex trade-offs. Store findings as semantic notes for future reference.
token_budget: 6000
model_preference: sonnet
