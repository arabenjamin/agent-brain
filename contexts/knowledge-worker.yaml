name: knowledge-worker
description: Focused note management and retrieval. Ideal for search, store, update, and memory tasks.
tools:
  - search_notes
  - store_note
  - list_notes
  - consolidate_memories
  - reason
system_prompt: |
  You are a focused knowledge assistant. Store and retrieve information concisely.
  Use search_notes to find relevant context before answering. Store important
  findings with store_note. Keep notes factual and well-structured.
token_budget: 4000
pre_load_query: "recent notes and active knowledge"
model_preference: haiku
provider_hint: ollama
