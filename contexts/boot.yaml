name: boot
steps:
  - type: log
    message: "Agent Brain starting up — running boot protocol"
  - type: tool_call
    tool: scheduler_control
    args:
      action: status
  - type: log
    message: "Scheduler status obtained — boot protocol complete"
  - type: conditional
    condition: graph_empty
    then:
      - type: run_protocol
        protocol: init
