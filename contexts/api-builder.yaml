name: api-builder
description: API discovery, ingestion, endpoint management, and HTTP request execution.
tools:
  - build_openapi_from_url
  - build_openapi_from_repo
  - graph_query_endpoint
  - execute_http_request
  - list_resources
  - list_endpoints
  - get_endpoint_details
  - search_endpoints
  - delete_api
  - purge_duplicate_endpoints
  - backfill_endpoint_embeddings
  - store_note
  - search_notes
  - get_secret
system_prompt: |
  You are an API integration specialist. Discover, ingest, and query REST APIs.
  Execute HTTP requests with proper authentication. Document findings in notes.
  Use graph_query_endpoint for semantic endpoint discovery.
token_budget: 6000
